<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Unit Tests</title>
<style>
  body { font-family: monospace; margin: 20px; }
  .pass { color: green; }
  .fail { color: red; }
  #summary { font-size: 1.2em; margin-top: 20px; padding: 10px; border-top: 2px solid #333; }
</style>
</head>
<body>

<h2>Unit Tests</h2>
<!-- Hidden SVG for rendering tests -->
<svg id="mySVG" width="800" height="600" style="display:none"></svg>
<div id="results"></div>
<div id="summary"></div>

<!-- Source files -->
<script src="../js/SvgHelper.js"></script>
<script src="../js/Shape.js"></script>
<script src="../js/Container.js"></script>
<script src="../js/ReusableComponent.js"></script>
<script src="../js/Renderer.js"></script>
<script src="../js/DragHandler.js"></script>

<!-- Test framework -->
<script>
window.T = (() => {
    const results = document.getElementById("results");
    let passed = 0, failed = 0, currentSuite = "";

    function log(msg, ok) {
        const div = document.createElement("div");
        div.className = ok ? "pass" : "fail";
        div.textContent = (ok ? "✓ " : "✗ ") + currentSuite + " > " + msg;
        results.appendChild(div);
    }

    return {
        suite(name) { currentSuite = name; },
        assert(desc, condition) {
            if (condition) { passed++; log(desc, true); }
            else { failed++; log(desc, false); }
        },
        eq(desc, actual, expected) {
            const ok = JSON.stringify(actual) === JSON.stringify(expected);
            if (ok) { passed++; log(desc, true); }
            else { failed++; log(desc + ` (got ${JSON.stringify(actual)}, expected ${JSON.stringify(expected)})`, false); }
        },
        throws(desc, fn) {
            try { fn(); failed++; log(desc + " (no error thrown)", false); }
            catch(e) { passed++; log(desc, true); }
        },
        done() {
            const s = document.getElementById("summary");
            s.textContent = `Total: ${passed + failed} | Passed: ${passed} | Failed: ${failed}`;
            s.style.color = failed ? "red" : "green";
        }
    };
})();
</script>

<!-- Test files -->
<script src="test_shapes.js"></script>
<script src="test_containers.js"></script>

<script>T.done();</script>
</body>
</html>
