<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Layout Engine</title>
<style>
  body { margin: 0; font-family: sans-serif; }
  svg, canvas { border: 1px solid #ccc; }
  #toggleBackend { margin: 8px; padding: 4px 12px; cursor: pointer; }
</style>
</head>
<body>

<button id="toggleBackend"></button>
<br>
<svg id="mySVG" width="800" height="600"></svg>
<canvas id="myCanvas" width="800" height="600" style="display:none"></canvas>

<!-- ===== Graphics Framework ===== -->

<!-- Shapes -->
<script src="js/renderers/RenderVisitor.js"></script>
<script src="js/shapes/Shape.js"></script>
<script src="js/shapes/Rect.js"></script>
<script src="js/shapes/Circle.js"></script>
<script src="js/shapes/Ellipse.js"></script>
<script src="js/shapes/TextShape.js"></script>
<script src="js/shapes/Line.js"></script>
<script src="js/shapes/Polygon.js"></script>
<script src="js/shapes/Polyline.js"></script>

<!-- Containers -->
<script src="js/containers/Group.js"></script>
<script src="js/containers/Table.js"></script>
<script src="js/containers/ReusableComponent.js"></script>
<script src="js/containers/VirtualComponent.js"></script>

<!-- Renderers -->
<script src="js/renderers/SvgRenderVisitor.js"></script>
<script src="js/renderers/CanvasRenderVisitor.js"></script>
<script src="js/renderers/SvgRenderer.js"></script>
<script src="js/renderers/CanvasRenderer.js"></script>

<!-- Handlers & Data -->
<script src="js/handlers/DragHandler.js"></script>
<script src="js/data/Store.js"></script>

<!-- ===== Demo / Prototype ===== -->
<script src="demo/ast.js"></script>

<!-- TikZ Application Layer -->
<script src="tikz/TikzAst.js"></script>
<script src="tikz/TikzMapper.js"></script>
<script src="tikz/tikz_demo.js"></script>

<!-- Entry Point -->
<script src="demo/main.js"></script>

</body>
</html>
