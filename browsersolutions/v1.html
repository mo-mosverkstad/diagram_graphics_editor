<svg id="mySVG"></svg>

<script>
const svgNS = "http://www.w3.org/2000/svg";

// --- Primitive renderers ---
const basicRender = {
    rect: ({ x = 0, y = 0, width = 0, height = 0, fill = "black" }) => {
        const el = document.createElementNS(svgNS, "rect");
        el.setAttribute("x", x);
        el.setAttribute("y", y);
        el.setAttribute("width", width);
        el.setAttribute("height", height);
        el.setAttribute("fill", fill);
        return el;
    },

    circle: ({ x = 0, y = 0, radius = 0, fill = "black" }) => {
        const el = document.createElementNS(svgNS, "circle");
        el.setAttribute("cx", x);
        el.setAttribute("cy", y);
        el.setAttribute("r", radius);
        el.setAttribute("fill", fill);
        return el;
    },

    text: ({ x = 0, y = 0, text = "", fill = "black", alignmentBaseline = "auto"}) => {
        const el = document.createElementNS(svgNS, "text");
        el.setAttribute("x", x);
        el.setAttribute("y", y);
        el.setAttribute("fill", fill);
        el.setAttribute("alignment-baseline", alignmentBaseline);
        el.textContent = text;
        return el;
    }
};

// --- Renderer ---
function createRenderer(svg, AST) {
    const defsMap = Object.fromEntries(
        (AST.defs || []).map(d => [d.type, d])
    );

    function resolveProps(template, scope) {
        const out = {};
        for (let key in template) {
            if (key === "type") continue;

            const val = template[key];
            out[key] =
                (typeof val === "string" && val in scope)
                    ? scope[val]
                    : val;
        }
        return out;
    }

    function renderNode(node, rootNode, scope = {}) {
        const { type, props = {} } = node;
    
        // --- Custom component ---
        if (defsMap[type]) {
            const def = defsMap[type];
            const merged = { ...def.props, ...props };
    
            const g = document.createElementNS(svgNS, "g");
    
            const children = def.layout.flatMap(child =>
                renderNode(
                    {
                        type: child.type,
                        props: resolveProps(child, merged)
                    },
                    node, // root node = component instance
                    merged
                )
            );
    
            children.forEach(childEl => g.appendChild(childEl));
    
            // Attach root reference to the group (IMPORTANT for dragging + wrap)
            g.__rootNode = node;
    
            return [g];
        }
    
        // --- Primitive ---
        if (!basicRender[type]) {
            console.warn("Unknown type:", type);
            return [];
        }
    
        const el = basicRender[type](props);
    
        el.__rootNode = rootNode || node;
    
        return [el];
    }

    function render() {
        svg.innerHTML = "";
    
        const elements = AST.components
            .flatMap(node => renderNode(node, node));
    
        elements.forEach(el => svg.appendChild(el));
    
        // Skip wrap logic while dragging
        if (isDragging) return;
    
        // --- Wrap pass ---
        let needsRerender = false;
    
        elements.forEach(el => {
            if (el.tagName !== "g") return;
    
            const root = el.__rootNode;
            if (!root || !root.props) return;
    
            const { wrapWidth, wrapHeight } = root.props;
            if (!wrapWidth && !wrapHeight) return;
    
            const bbox = el.getBBox();
    
            if (wrapWidth) {
                if (root.props.width !== bbox.width) {
                    root.props.width = bbox.width;
                    needsRerender = true;
                }
            }
    
            if (wrapHeight) {
                if (root.props.height !== bbox.height) {
                    root.props.height = bbox.height;
                    needsRerender = true;
                }
            }
        });
    
        if (needsRerender) {
            svg.innerHTML = "";
            AST.components
                .flatMap(node => renderNode(node, node))
                .forEach(el => svg.appendChild(el));
        }
    }
    return { render };
}

let isDragging = false;

// --- Drag System ---
function enableDragging(svg, renderer) {
    let selected = null;
    let offsetX = 0;
    let offsetY = 0;

    svg.addEventListener("mousedown", (e) => {
        const target = e.target;
        if (!target.__rootNode) return;

        selected = target.__rootNode;

        const props = selected.props;

        const x = props.x ?? 0;
        const y = props.y ?? 0;

        offsetX = e.offsetX - x;
        offsetY = e.offsetY - y;

        isDragging = true; // START dragging
    });

    svg.addEventListener("mousemove", (e) => {
        if (!selected) return;

        selected.props.x = e.offsetX - offsetX;
        selected.props.y = e.offsetY - offsetY;

        renderer.render();
    });

    svg.addEventListener("mouseup", () => {
        selected = null;
        isDragging = false; // STOP dragging
    });

    svg.addEventListener("mouseleave", () => {
        selected = null;
        isDragging = false; // STOP dragging
    });
}



// ==== USAGE ====

const AST = {
    defs: [
        {
            type: "button1",
            props: { x: 0, y: 0, width: 100, height: 40, text: "Btn" },
            layout: [
                { type: "rect", x: "x", y: "y", width: "width", height: "height", fill: "lightgray" },
                { type: "rect", x: "x", y: "y", width: 40, height: 80, fill: "purple" },
                { type: "text", x: "x", y: "y", text: "text", fill: "black", alignmentBaseline: "hanging"}
            ]
        },
        {
            type: "button2",
            props: { x: 0, y: 0, width: 100, height: 40, text: "Btn" },
            layout: [
                { type: "rect", x: "x", y: "y", width: "width", height: "height", fill: "lightgray" },
                { type: "rect", x: "x", y: "y", width: 40, height: 30, fill: "purple" },
                { type: "rect", x: "x", y: "y", width: 50, height: 20, fill: "orange" },
                { type: "text", x: "x", y: "y", text: "text", fill: "black", alignmentBaseline: "hanging"}
            ]
        }
    ],
    components: [
        { type: "circle", props: { x: 100, y: 100, radius: 50, fill: "blue" } },
        { type: "rect", props: { x: 200, y: 300, width: 50, height: 50, fill: "red" } },
        { type: "button1", props: { x: 10, y: 30, wrapWidth: true, wrapHeight: true, text: "Button! Loooooooooooong text"} },
        { type: "button2", props: { x: 100, y: 30, wrapWidth: true, wrapHeight: true, text: "Button! Loooooooooooong text"} }
    ]
};

const svg = document.getElementById("mySVG");
svg.setAttribute("width", 500);
svg.setAttribute("height", 500);

const renderer = createRenderer(svg, AST);
renderer.render();

enableDragging(svg, renderer);

window.ast = AST;
</script>
