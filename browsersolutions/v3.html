<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SVG Layout Engine</title>
<style>
  body { margin: 0; font-family: sans-serif; }
  svg { border: 1px solid #ccc; display: block; }
</style>
</head>
<body>

<svg id="mySVG" width="800" height="600"></svg>

<script>
const svgNS = "http://www.w3.org/2000/svg";

// --- Primitive renderers ---
const basicRender = {
    rect: ({ x = 0, y = 0, width = 0, height = 0, fill = "black" }) =>
        createSVGElement("rect", { x, y, width, height, fill }),

    circle: ({ x = 0, y = 0, radius = 0, fill = "black" }) =>
        createSVGElement("circle", { cx: x, cy: y, r: radius, fill }),

    line: ({ x1 = 0, y1 = 0, x2 = 0, y2 = 0, stroke = "black", strokeWidth = 1 }) =>
        createSVGElement("line", { x1, y1, x2, y2, stroke, "stroke-width": strokeWidth }),

    ellipse: ({ x = 0, y = 0, rx = 0, ry = 0, fill = "black" }) =>
        createSVGElement("ellipse", { cx: x, cy: y, rx, ry, fill }),

    polygon: ({ points = [], fill = "black" }) =>
        createSVGElement("polygon", { points: points.map(p => `${p.x},${p.y}`).join(" "), fill }),

    polyline: ({ points = [], stroke = "black", strokeWidth = 1, fill = "none" }) =>
        createSVGElement("polyline", { points: points.map(p => `${p.x},${p.y}`).join(" "), stroke, "stroke-width": strokeWidth, fill }),

    text: ({ x = 0, y = 0, text = "", fill = "black", alignmentBaseline = "auto" }) => {
        const el = createSVGElement("text", { x, y, fill, "alignment-baseline": alignmentBaseline });
        el.textContent = text;
        return el;
    },
};

// Utility: create SVG element with attributes
function createSVGElement(tag, attrs) {
    const el = document.createElementNS(svgNS, tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    return el;
}

// --- Renderer ---
function createRenderer(svg, AST) {
    const defsMap = Object.fromEntries((AST.defs || []).map(d => [d.type, d]));

    const resolveProps = (template, scope) =>
        Object.fromEntries(Object.entries(template)
            .filter(([k]) => k !== "type")
            .map(([k, v]) => [k, typeof v === "string" && v in scope ? scope[v] : v])
        );

    const applyOffset = (props, type, offset) => {
        if (type === "line") {
            return {
                ...props,
                x1: (props.x1 ?? 0) + offset.x,
                y1: (props.y1 ?? 0) + offset.y,
                x2: (props.x2 ?? 0) + offset.x,
                y2: (props.y2 ?? 0) + offset.y
            };
        }
        if (["polygon", "polyline"].includes(type)) {
            return { ...props, points: (props.points || []).map(p => ({ x: p.x + offset.x, y: p.y + offset.y })) };
        }
        return { ...props, x: (props.x ?? 0) + offset.x, y: (props.y ?? 0) + offset.y };
    };

    const renderNode = (node, rootNode = node, scope = {}, parentOffset = { x: 0, y: 0 }) => {
        const { type, props = {}, children = [] } = node;
        const offset = { x: parentOffset.x + (props.x ?? 0), y: parentOffset.y + (props.y ?? 0) };

        // --- Custom component ---
        if (defsMap[type]) {
            const def = defsMap[type];
            const mergedProps = { ...def.props, ...props };
            const g = createSVGElement("g", {});
            def.layout.forEach(child => {
                renderNode({ type: child.type, props: resolveProps(child, mergedProps) }, node, mergedProps, parentOffset)
                    .forEach(el => g.appendChild(el));
            });
            g.__rootNode = node;
            return [g];
        }

        // --- GROUP ---
        if (type === "group") {
            const g = createSVGElement("g", {});
            children.flatMap(child => renderNode(child, rootNode, scope, offset)).forEach(el => g.appendChild(el));
            g.__rootNode = rootNode;
            return [g];
        }

        // --- TABLE ---
        if (type === "table") {
            const { rows = 1, cols = 1, cellWidth = 50, cellHeight = 50, gap = 0 } = props;
            const g = createSVGElement("g", {});
            let index = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!children[index]) continue;
                    const cellOffset = { x: offset.x + c * (cellWidth + gap), y: offset.y + r * (cellHeight + gap) };
                    renderNode(children[index++], rootNode, scope, cellOffset).forEach(el => g.appendChild(el));
                }
            }
            g.__rootNode = rootNode;
            return [g];
        }

        // --- Primitive ---
        if (!basicRender[type]) {
            console.warn("Unknown type:", type);
            return [];
        }

        const el = basicRender[type](applyOffset(props, type, offset));
        el.__rootNode = rootNode;
        return [el];
    };

    return {
        render: () => {
            svg.innerHTML = "";
            AST.components.flatMap(node => renderNode(node, node)).forEach(el => svg.appendChild(el));
        }
    };
}

// --- Dragging ---
function enableDragging(svg, renderer) {
    let selected = null, offsetX = 0, offsetY = 0;

    const getAnchor = node => {
        const p = node.props;
        if ("x" in p || "y" in p) return { x: p.x ?? 0, y: p.y ?? 0 };
        if ("x1" in p && "y1" in p) return { x: p.x1, y: p.y1 };
        if (p.points?.length) return { x: p.points[0].x, y: p.points[0].y };
        return { x: 0, y: 0 };
    };

    const updateProps = (p, dx, dy) => {
        if ("x" in p || "y" in p) { p.x += dx; p.y += dy; }
        else if ("x1" in p && "x2" in p) { p.x1 += dx; p.y1 += dy; p.x2 += dx; p.y2 += dy; }
        else if (p.points) { p.points = p.points.map(pt => ({ x: pt.x + dx, y: pt.y + dy })); }
    };

    svg.addEventListener("mousedown", e => {
        const target = e.target;
        if (!target.__rootNode) return;
        selected = target.__rootNode;
        const { x, y } = getAnchor(selected);
        offsetX = e.offsetX - x;
        offsetY = e.offsetY - y;
    });

    svg.addEventListener("mousemove", e => {
        if (!selected) return;
        const p = selected.props;
        const newX = e.offsetX - offsetX;
        const newY = e.offsetY - offsetY;
        const anchor = getAnchor(selected);
        updateProps(p, newX - anchor.x, newY - anchor.y);
        renderer.render();
    });

    ["mouseup", "mouseleave"].forEach(evt => svg.addEventListener(evt, () => selected = null));
}

// ==== AST ====
const AST = {
    defs: [
        {
            type: "button",
            props: { x: 0, y: 0, width: 120, height: 40, text: "Btn" },
            layout: [
                { type: "rect", x: "x", y: "y", width: "width", height: "height", fill: "lightgray" },
                { type: "text", x: "x", y: "y", text: "text", fill: "black", alignmentBaseline: "hanging" }
            ]
        }
    ],

    components: [
        // Basic shapes
        { type: "circle", props: { x: 100, y: 100, radius: 40, fill: "blue" } },

        // GROUP demo
        {
            type: "group",
            props: { x: 200, y: 100 },
            children: [
                { type: "rect", props: { width: 100, height: 50, fill: "green" } },
                { type: "circle", props: { x: 120, y: 25, radius: 20, fill: "orange" } }
            ]
        },

        // TABLE demo
        {
            type: "table",
            props: {
                x: 100,
                y: 250,
                rows: 2,
                cols: 3,
                cellWidth: 80,
                cellHeight: 80,
                gap: 10
            },
            children: [
                { type: "rect", props: { width: 60, height: 60, fill: "red" } },
                { type: "rect", props: { width: 60, height: 60, fill: "blue" } },
                { type: "circle", props: { radius: 25, fill: "orange" } },
                { type: "circle", props: { radius: 25, fill: "purple" } },
                { type: "circle", props: { radius: 25, fill: "black" } },
                { type: "circle", props: { radius: 25, fill: "gray" } }
            ]
        },

        // Component demo
        { type: "button", props: { x: 400, y: 100, text: "Drag me!" } },
        { type: "button", props: { x: 100, y: 100, text: "Drag me!" } },
        { type: "line", props: {x1: 100, y1: 100, x2: 200, y2: 200}}
    ]
};

// ==== INIT ====
const svg = document.getElementById("mySVG");
const renderer = createRenderer(svg, AST);
renderer.render();
enableDragging(svg, renderer);
window.ast = AST;

</script>

</body>
</html>
